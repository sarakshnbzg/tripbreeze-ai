services:
  backend:
    build:
      context: .
    image: tripbreeze-ai
    ports:
      - "8100:8100"
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8100
      REBUILD_RAG_IF_MISSING: 1
    volumes:
      - ./chroma_db:/app/chroma_db
  frontend:
    build:
      context: ./frontend
    image: tripbreeze-web
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8100
    ports:
      - "3000:3000"
